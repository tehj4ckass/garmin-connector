services:
  garmin-connector:
    build:
      context: .
      dockerfile: Dockerfile.connector
    container_name: garmin-connector
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - SYNC_TIMES=06:00,07:00,08:00,09:00,10:00,11:00,12:00,13:00,14:00,15:00,16:00,17:00,18:00,19:00,20:00,21:00,22:00
    volumes:
      # Persist JSON exports and OAuth tokens on host.
      - .:/app
  dashboard:
    build: .
    container_name: garmin-dashboard
    restart: unless-stopped
    command: streamlit run dashboard/app.py --server.address=0.0.0.0 --server.port=8501
    environment:
      - TZ=Europe/Berlin
      - DASHBOARD_DATA_DIR=/app
    volumes:
      - .:/app
    ports:
      - "8501:8501"